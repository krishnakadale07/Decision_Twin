<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account — Decision Twin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
  .auth-container-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    position: relative;
    z-index: 1;
  }

  .auth-card {
    background: rgba(10, 65, 116, 0.25);
    border: 1px solid rgba(123, 189, 232, 0.25);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 20px 50px rgba(0, 10, 20, 0.5);
    backdrop-filter: blur(12px);
  }

  .auth-header {
    text-align: center;
    margin-bottom: 28px;
  }

  .auth-header h2 {
    font-size: 1.75rem;
    color: var(--white);
    margin-top: 12px;
  }

  .auth-header p {
    color: var(--pale);
    font-size: 0.9rem;
    margin-top: 6px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    font-size: 0.85rem;
    color: var(--pale);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid rgba(123, 189, 232, 0.2);
    background: rgba(0, 20, 40, 0.6);
    color: var(--white);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  .form-group select option {
    background: #0a2540;
    color: var(--white);
  }

  .form-group input:focus,
  .form-group select:focus {
    border-color: var(--sky);
    box-shadow: 0 0 10px rgba(123, 189, 232, 0.25);
  }

  .form-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.85rem;
    margin-bottom: 24px;
  }

  .forgot-link {
    color: var(--sky);
    transition: opacity 0.2s ease;
  }

  .forgot-link:hover { opacity: 0.8; }

  .btn-submit {
    width: 100%;
    padding: 14px;
    font-size: 1rem;
    margin-bottom: 20px;
  }

  .auth-switch {
    text-align: center;
    font-size: 0.9rem;
    color: var(--pale);
  }

  .auth-switch a {
    color: var(--sky);
    font-weight: 600;
    margin-left: 4px;
    cursor: pointer;
  }

  .auth-switch a:hover { text-decoration: underline; }

  /* Modes visibility */
  .auth-mode { display: none; }
  .auth-mode.active { display: block; }

  .back-home {
    position: absolute;
    top: 24px;
    left: 24px;
    color: var(--pale);
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.2s ease;
  }

  .back-home:hover { color: var(--sky); }
</style>
</head>
<body>

  <div class="bg-decor" aria-hidden="true">
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>
  </div>

  <a href="../index.html" class="back-home">← Back to Decision Twin</a>

  <div class="auth-container-page">
    <div class="auth-card">
      <div class="auth-header">
        <span class="logo-text">DECISION <span class="accent">TWIN</span></span>
        <h2 id="auth-title">Welcome Back</h2>
        <p id="auth-subtitle">Log in to view saved comparisons & stats</p>
      </div>

      <!-- 1. LOGIN FORM -->
      <form id="login-form" class="auth-mode active" onsubmit="handleLogin(event)" autocomplete="off">
        <div class="form-group">
          <label for="login-username">Username or Email</label>
          <input type="text" id="login-username" placeholder="username or email" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="new-password" required>
        </div>
        <div class="form-group">
          <label for="login-role">Login As</label>
          <select id="login-role" required>
            <option value="user" selected>User</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-actions">
          <a href="#" class="forgot-link" onclick="switchMode('forgot')">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-accent btn-submit">Sign In</button>
        <div class="auth-switch">
          Don't have an account? <a onclick="switchMode('signup')">Sign Up</a>
        </div>
      </form>

      <!-- 2. SIGNUP FORM -->
      <form id="signup-form" class="auth-mode" onsubmit="handleSignup(event)" autocomplete="off">
        <div class="form-group">
          <label for="signup-name">Username</label>
          <input type="text" id="signup-name" placeholder="alexmorgan" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label for="signup-email">Email Address</label>
          <input type="email" id="signup-email" placeholder="name@company.com" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="Min. 8 characters" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn btn-accent btn-submit">Create Account</button>
        <div class="auth-switch">
          Already have an account? <a onclick="switchMode('login')">Login</a>
        </div>
      </form>

      <!-- 3. FORGOT PASSWORD FORM -->
      <form id="forgot-form" class="auth-mode" onsubmit="handleForgot(event)" autocomplete="off">
        <div class="form-group">
          <label for="forgot-email">Email Address</label>
          <input type="email" id="forgot-email" placeholder="name@company.com" autocomplete="off" required>
        </div>
        <button type="submit" class="btn btn-accent btn-submit">Send Reset Link</button>
        <div class="auth-switch">
          Remembered your password? <a onclick="switchMode('login')">Back to Login</a>
        </div>
      </form>

    </div> 
  </div>

  <script>
    const API_BASE_URL = 'http://127.0.0.1:5000/api';

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('form').forEach(form => form.reset());
    });

    function switchMode(mode) {
      document.querySelectorAll('.auth-mode').forEach(el => el.classList.remove('active'));
      
      const title = document.getElementById('auth-title');
      const subtitle = document.getElementById('auth-subtitle');

      if (mode === 'login') {
        document.getElementById('login-form').classList.add('active');
        title.innerText = 'Welcome Back';
        subtitle.innerText = 'Log in to view saved comparisons & stats';
      } else if (mode === 'signup') {
        document.getElementById('signup-form').classList.add('active');
        title.innerText = 'Create Account';
        subtitle.innerText = 'Start making smarter decisions with AI insights';
      } else if (mode === 'forgot') {
        document.getElementById('forgot-form').classList.add('active');
        title.innerText = 'Reset Password';
        subtitle.innerText = "Enter your email and we'll send a reset link";
      }
    }

    // CONNECTED LOGIN HANDLER
    async function handleLogin(e) {
      e.preventDefault();
      const usernameInput = document.getElementById('login-username').value;
      const passwordInput = document.getElementById('login-password').value;
      const roleInput = document.getElementById('login-role').value;

      try {
        const response = await fetch(`${API_BASE_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: usernameInput,
            password: passwordInput
          })
        });

        const data = await response.json();

        if (response.ok && data.access_token) {
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('userEmail', data.user?.email || usernameInput);
          localStorage.setItem('pathway_user_fullname', data.user?.username || usernameInput);
          localStorage.setItem('userRole', roleInput);
          localStorage.setItem('isLoggedIn', 'true');

          if (roleInput === 'admin') {
            window.location.href = '../adminpanel/admin_dashboard.html';
          } else {
            window.location.href = '../dashboard/dashboard.html';
          }
        } else {
          alert(data.error || 'Login failed. Invalid credentials.');
        }
      } catch (err) {
        console.error('API Error:', err);
        alert('Could not connect to Flask server. Please check if backend is running.');
      }
    }

    // CONNECTED SIGNUP HANDLER
    async function handleSignup(e) {
      e.preventDefault();
      const usernameInput = document.getElementById('signup-name').value;
      const emailInput = document.getElementById('signup-email').value;
      const passwordInput = document.getElementById('signup-password').value;

      try {
        const response = await fetch(`${API_BASE_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: usernameInput,
            email: emailInput,
            password: passwordInput
          })
        });

        const data = await response.json();

        if (response.ok) {
          alert('Account created successfully! Please log in.');
          switchMode('login');
        } else {
          alert(data.error || 'Registration failed.');
        }
      } catch (err) {
        console.error('API Error:', err);
        alert('Could not connect to Flask server. Please check if backend is running.');
      }
    }

    function handleForgot(e) {
      e.preventDefault();
      alert('Password reset link sent to your email!');
      switchMode('login');
    }
  </script>
</body>
</html>
