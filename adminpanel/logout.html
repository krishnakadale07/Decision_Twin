<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Logout</title>

    <link rel="stylesheet" href="admin_dashboard.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

    <main class="main-content" style="margin-left:0; width:100%; display:flex; justify-content:center; align-items:center; min-height:100vh;">

        <div class="users-container" style="max-width:500px; text-align:center;">

            <div class="summary-icon red" style="margin:0 auto 20px;">
                <i class="fas fa-right-from-bracket"></i>
            </div>

            <h2 style="color:#1f2937;">You have been logged out</h2>

            <p style="margin:15px 0 30px; color:#4b5563;">
                Thank you for using the Decision Twin Admin Panel.
                Click below to login again.
            </p>

            <a href="../login/index.html" class="refresh-btn" style="text-decoration:none; padding:12px 25px;">
                <i class="fas fa-right-to-bracket"></i>
                Login Again
            </a>

        </div>

    </main>

</div>
