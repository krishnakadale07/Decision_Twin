<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Settings</title>

    <!-- CSS -->
    <link rel="stylesheet" href="admin_dashboard.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- ===========================
            SIDEBAR
    ============================ -->

    <aside class="sidebar">

        <div class="logo">
            <h2>Decision Twin</h2>
            <p>Admin Panel</p>
        </div>

        <ul>

            <li>
                <a href="admin_dashboard.html">
                    <i class="fas fa-house"></i>
                    <span>Dashboard</span>
                </a>
            </li>

            <li>
                <a href="manage_users.html">
                    <i class="fas fa-users"></i>
                    <span>Manage Users</span>
                </a>
            </li>

            <li>
                <a href="career_management.html">
                    <i class="fas fa-graduation-cap"></i>
                    <span>Career Management</span>
                </a>
            </li>

            <li>
                <a href="latest_recommendation.html">
                    <i class="fas fa-brain"></i>
                    <span>Latest Recommendation</span>
                </a>
            </li>

            <li>
                <a href="notifications.html">
                    <i class="fas fa-bell"></i>
                    <span>Notifications</span>
                </a>
            </li>

            <li class="active">
                <a href="settings.html">
                    <i class="fas fa-gear"></i>
                    <span>Settings</span>
                </a>
            </li>

            <li>
                <a href="logout.html">
                    <i class="fas fa-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </li>

        </ul>

    </aside>

    <!-- ===========================
            MAIN CONTENT
    ============================ -->

        <!-- ===========================
            MAIN CONTENT
    ============================ -->

  <main class="main-content">

    <!-- Header -->
    <header class="topbar">

        <div class="dashboard-title">

            <a href="admin_dashboard.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>

            <div>
                <h1>Profile Settings</h1>
                <p>Manage your administrator account.</p>
            </div>

        </div>

    </header>

    <!-- Profile Section -->
    <section class="settings-container">

        <div class="setting-card">

            <div style="text-align:center; margin-bottom:25px;">

                <i class="fas fa-user-circle"
                   style="font-size:90px;color:#4da3ff;"></i>

                <h2 style="margin-top:15px;">Administrator</h2>

                <p>admin@decisiontwin.com</p>

            </div>

            <div class="form-group">

                <label>Full Name</label>
                <input type="text" placeholder="Enter Full Name">

            </div>

            <div class="form-group">

                <label>Email Address</label>
                <input type="email" placeholder="Enter Email">

            </div>

            <div class="form-group">

                <label>Phone Number</label>
                <input type="text" placeholder="Enter Phone Number">

            </div>

            <div class="form-group">

                <label>Username</label>
                <input type="text" placeholder="Enter Username">

            </div>

            <hr style="margin:30px 0;">

            <h3>Change Password</h3>

            <div class="form-group">

                <label>Current Password</label>
                <input type="password" placeholder="Current Password">

            </div>

            <div class="form-group">

                <label>New Password</label>
                <input type="password" placeholder="New Password">

            </div>

            <div class="form-group">

                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm Password">

            </div>

            <div style="margin-top:30px; display:flex; gap:15px;">

                <button class="btn">Save Changes</button>

                <button class="btn">Update Password</button>

            </div>

        </div>

    </section>

</main>

</div>

</body>
</html>
